<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>UNMARKED TAPE</title>
  <meta name="description" content="A found-footage horror experience. Every run is recorded to tape. The less you know, the better." />
  <meta property="og:title" content="UNMARKED TAPE" />
  <meta property="og:description" content="A found-footage horror experience. Every run is recorded to tape. Headphones on. Lights off." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://bootoshi.ai/backrooms/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:site" content="@kingbootoshi" />
  <meta name="twitter:title" content="UNMARKED TAPE" />
  <meta name="twitter:description" content="A found-footage horror experience. Every run is recorded to tape. Headphones on. Lights off." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    body { font-family: "Courier New", Courier, monospace; color: #e8e8e8; }
    #app { position: fixed; inset: 0; }
    #app canvas { display: block; width: 100%; height: 100%; cursor: none; }

    .overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: #000; z-index: 10; text-align: center;
    }
    .overlay.hidden { display: none; }

    /* CRT scanline wash on overlays */
    .overlay::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px,
        rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 3px);
      mix-blend-mode: overlay;
    }

    .tape-label {
      border: 1px solid #444; padding: 28px 44px; background: #0a0a0a;
      box-shadow: 0 0 80px rgba(255, 255, 200, 0.04) inset;
      max-width: 520px;
    }
    .tape-title {
      font-size: 26px; letter-spacing: 6px; color: #d8d2b8;
      text-shadow: 0 0 12px rgba(216, 210, 184, 0.35);
    }
    .tape-sub { font-size: 12px; color: #777; margin-top: 10px; letter-spacing: 2px; }
    .tape-meta { font-size: 11px; color: #555; margin-top: 18px; letter-spacing: 1px; line-height: 1.8; }

    .btn {
      font-family: inherit; font-size: 15px; letter-spacing: 4px;
      background: transparent; color: #e8e8e8; border: 1px solid #888;
      padding: 12px 34px; cursor: pointer; margin-top: 8px;
      transition: background 0.15s, color 0.15s;
    }
    .btn:hover { background: #e8e8e8; color: #000; }
    .btn.secondary { border-color: #555; color: #999; font-size: 12px; padding: 9px 22px; }
    .btn.secondary:hover { background: #555; color: #fff; }

    .site-link {
      position: absolute; bottom: 22px; left: 0; right: 0;
      font-size: 11px; letter-spacing: 3px; color: #555;
      text-decoration: none; transition: color 0.15s;
    }
    .site-link:hover { color: #d8d2b8; }
    .site-link span { border-bottom: 1px dotted #444; padding-bottom: 2px; }

    .blink { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    #end-overlay { gap: 14px; }
    #end-title { font-size: 30px; letter-spacing: 8px; }
    #end-title.death { color: #c33; text-shadow: 0 0 18px rgba(204, 51, 51, 0.5); }
    #end-title.escape { color: #9c9; text-shadow: 0 0 18px rgba(153, 204, 153, 0.5); }
    #end-sub { font-size: 12px; color: #888; letter-spacing: 2px; }
    #replay {
      width: min(76vw, 920px); aspect-ratio: 16 / 9; background: #050505;
      border: 1px solid #333; outline: none;
    }
    .end-buttons { display: flex; gap: 14px; }
    #pause-overlay { background: rgba(0, 0, 0, 0.82); }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="start-overlay" class="overlay">
    <div class="tape-label">
      <div class="tape-title">UNMARKED TAPE</div>
      <div class="tape-sub">found footage &mdash; condition: degraded</div>
      <div class="tape-meta">
        WASD &mdash; move &nbsp;&middot;&nbsp; MOUSE &mdash; look &nbsp;&middot;&nbsp; SHIFT &mdash; run<br />
        headphones strongly recommended<br />
        your full journey is recorded to tape
      </div>
    </div>
    <button id="start-btn" class="btn">&#9654; PLAY TAPE</button>
    <div class="tape-sub blink" style="letter-spacing:3px">INSERT &middot; STANDBY</div>
    <a class="site-link" href="https://bootoshi.ai" title="back to the kingdom"><span>RECOVERED BY BOOTOSHI.AI</span></a>
  </div>

  <div id="pause-overlay" class="overlay hidden">
    <div class="tape-title" style="font-size:20px">&#10074;&#10074; PAUSED</div>
    <div class="tape-sub">click to resume &mdash; tape is still rolling</div>
  </div>

  <div id="end-overlay" class="overlay hidden">
    <div id="end-title"></div>
    <div id="end-sub"></div>
    <video id="replay" controls playsinline></video>
    <div class="end-buttons">
      <button id="save-btn" class="btn">SAVE TAPE</button>
      <button id="restart-btn" class="btn secondary">NEW TAPE</button>
    </div>
    <a class="site-link" href="https://bootoshi.ai" title="back to the kingdom"><span>RECOVERED BY BOOTOSHI.AI</span></a>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
